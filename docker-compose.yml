version: "3.9"
services:
  familyboard:
    image: familyboard:latest
    container_name: familyboard
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3003}:3003"
    env_file:
      - .env
    volumes:
      # NAS .env 에 NAS_DATA_DIR=/volume2/가족보드 권장 (deploy.ps1 -PushEnv 로 .env 동기화)
      - ${NAS_DATA_DIR:-/volume2/가족보드}:/app/data
